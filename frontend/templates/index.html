<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposerver - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        /* Adiciona um indicador de atividade para o HTMX */
        .htmx-indicator{ display: none; }
        .htmx-request .htmx-indicator{ display: inline; }
        .htmx-request.htmx-indicator{ display: inline; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 antialiased">

    <div class="flex h-screen">
        <!-- Sidebar de Navegação -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0">
            <div class="p-5 border-b border-gray-700">
                <h1 class="text-2xl font-bold">Reposerver</h1>
                <p class="text-sm text-gray-400">Core System Online</p>
            </div>
            <nav class="mt-5" hx-target="#main-content" hx-swap="innerHTML">
                <a href="#" hx-get="/components/dashboard" class="flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700">
                    <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-7 4h7m-7 4h7"></path></svg>
                    Dashboard
                </a>
                <!-- Outros links serão adicionados aqui -->
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main id="main-content" class="flex-1 p-8 overflow-y-auto" hx-trigger="load" hx-get="/components/dashboard">
            <!-- O conteúdo será carregado aqui pelo HTMX -->
            <div class="text-center">
                <p>Carregando...</p>
                <div class="htmx-indicator">
                  <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
