
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loja Ninja - Painel Ninja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --naruto-orange: #f06d0d;
      --konoha-blue: #0d1a3e;
      --dark-blue: #060c1c;
      --text-light: #e0e0e0;
      --border-color: rgba(240, 109, 13, 0.25);
      --shadow-color: rgba(240, 109, 13, 0.35);
    }
    body {
      margin: 0;
      background-color: var(--dark-blue);
      background-image: url('https://i.imgur.com/7Bv0C5B.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
    }
    .page { width: min(1200px, 98vw); margin: 24px auto; padding: 16px; }
    header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 16px; padding: 16px; background: rgba(6, 12, 28, 0.7);
      border: 1px solid var(--border-color); border-radius: 16px;
      backdrop-filter: blur(10px); margin-bottom: 24px;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 3vw, 2.5rem); color: var(--naruto-orange); text-shadow: 0 0 10px var(--shadow-color); }
    .card {
      background: rgba(13, 26, 62, 0.8); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 24px; backdrop-filter: blur(8px);
    }
    .button {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 20px; border: 1px solid transparent; border-radius: 8px;
      background: linear-gradient(135deg, var(--naruto-orange), #ff5722); color: #fff;
      text-decoration: none; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
    }
    .button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240, 109, 13, 0.3); }
    .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .shop-item {
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        transition: all 0.3s ease;
    }
    .shop-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px var(--shadow-color);
        border-color: var(--naruto-orange);
    }
    .shop-item h3 {
        color: var(--naruto-orange);
        margin-top: 0;
    }
    .shop-item .price {
        font-weight: bold;
        color: #a3e1ff;
        margin: 10px 0;
    }
    .notice { padding: 16px; border-radius: 8px; background: rgba(6, 12, 28, 0.5); text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <header>
        <h1>Loja Ninja</h1>
        <div>
          <span style="margin-right: 20px;">Seu Ryo: {{ user.gold }}</span>
          <a class="button" href="/dashboard">Voltar ao Painel</a>
        </div>
    </header>

    <div class="card">
        <h2>Itens à Venda</h2>
        {% if items and items.length %}
            <div class="shop-grid">
                {% for item in items %}
                    <div class="shop-item">
                        <h3>{{ item.name }}</h3>
                        <p>{{ item.description }}</p>
                        <div class="price">Preço: {{ item.price }} Ryo</div>
                        <form method="post" action="/shop/buy/{{ item.id }}">
                            <button class="button">Comprar</button>
                        </form>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="notice">A loja está vazia. Volte mais tarde para novos itens!</div>
        {% endif %}
    </div>

  </div>
</body>
</html>
