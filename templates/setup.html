<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomeação do Hokage - Configuração</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --naruto-orange: #f06d0d;
      --konoha-blue: #0d1a3e;
      --dark-blue: #060c1c;
      --text-light: #e0e0e0;
      --border-color: rgba(240, 109, 13, 0.4);
      --shadow-color: rgba(240, 109, 13, 0.5);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--dark-blue);
      background-image: url('https://i.imgur.com/K5b0x1j.jpg');
      background-size: cover;
      background-position: center;
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
    }
    .card {
      position: relative;
      width: min(420px, 95vw);
      background: rgba(13, 26, 62, 0.9);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 0 70px var(--shadow-color);
      padding: 32px;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 2.2rem;
      color: var(--naruto-orange);
      text-shadow: 0 0 12px var(--shadow-color);
    }
    p {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 16px 0 8px;
      color: var(--text-light);
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--konoha-blue);
      color: var(--text-light);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--naruto-orange);
      box-shadow: 0 0 15px var(--shadow-color);
    }
    .submit-button {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
    }
    .error {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 82, 82, 0.2);
      color: #ffcdd2;
      border: 1px solid rgba(255, 82, 82, 0.5);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Decreto do Primeiro Hokage</h1>
    <p>A Vila precisa de um líder. Crie sua conta de Administrador (Kage) para proteger e gerenciar este servidor.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <label for="username">Seu Nome de Kage</label>
      <input type="text" id="username" name="username" value="admin" required autofocus>
      <label for="password">Sua Senha Mestra</label>
      <input type="password" id="password" name="password" required>
      <label for="confirm_password">Confirme a Senha</label>
      <input type="password" id="confirm_password" name="confirm_password" required>
      <button type="submit" class="submit-button">Assumir o Posto</button>
    </form>
  </div>
</body>
</html>
