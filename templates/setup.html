<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ panel_title }} - Instalação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --naruto-orange: #f06d0d;
      --konoha-blue: #0d1a3e;
      --dark-blue: #060c1c;
      --text-light: #e0e0e0;
      --border-color: rgba(240, 109, 13, 0.25);
      --shadow-color: rgba(240, 109, 13, 0.35);
    }
    body {
      margin: 0;
      background-color: var(--dark-blue);
      background-image: url('{{ background_image }}');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: min(400px, 90vw);
      background: rgba(13, 26, 62, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
      color: var(--naruto-orange);
      text-align: center;
      text-shadow: 0 0 10px var(--shadow-color);
    }
    .form-button {
      width: 100%;
      padding: 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--naruto-orange), #ff5722);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 16px;
      font-size: 1rem;
    }
    .form-button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow-color); }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--konoha-blue);
      color: var(--text-light);
      font-size: 1rem;
      box-sizing: border-box;
    }
    .notice {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid transparent;
    }
    .notice.danger { background-color: rgba(255, 70, 70, 0.15); border-color: rgba(255, 100, 100, 0.3); color: #ffcdd2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ativação do Painel</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="notice {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <input type="password" name="master_key" placeholder="Digite a chave de ativação" required>
      <button type="submit" class="form-button">Ativar</button>
    </form>
  </div>
</body>
</html>
