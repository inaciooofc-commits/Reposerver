<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - Painel Ninja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --naruto-orange: #f06d0d;
      --konoha-blue: #0d1a3e;
      --dark-blue: #060c1c;
      --text-light: #e0e0e0;
      --border-color: rgba(240, 109, 13, 0.25);
      --shadow-color: rgba(240, 109, 13, 0.35);
      --success-color: #4caf50;
    }
    body { background-color: var(--dark-blue); background-image: url('{{ bg }}'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--text-light); font-family: 'Roboto', sans-serif; margin: 0; }
    .page { width: min(1200px, 98vw); margin: 24px auto; padding: 16px; }
    header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 16px; padding: 16px; background: rgba(6, 12, 28, 0.7);
      border: 1px solid var(--border-color); border-radius: 16px;
      backdrop-filter: blur(10px); margin-bottom: 24px;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 3vw, 2.5rem); color: var(--naruto-orange); text-shadow: 0 0 10px var(--shadow-color); }
    .card {
      background: rgba(13, 26, 62, 0.8); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 24px; backdrop-filter: blur(8px);
    }
    .button {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 20px; border: 1px solid transparent; border-radius: 8px;
      background: linear-gradient(135deg, var(--naruto-orange), #ff5722); color: #fff;
      text-decoration: none; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
    }
    .button.secondary { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
    .mission-list { list-style: none; padding: 0; }
    .mission-item {
      background: rgba(6, 12, 28, 0.6); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px; margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    }
    .mission-reward { font-weight: bold; color: var(--success-color); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>{{ title }}</h1>
      <a class="button" href="{{ url_for('dashboard_bp.dashboard') }}">Voltar ao Painel</a>
    </header>

    <div class="card">
      <h2>Missões Diárias</h2>
      <ul class="mission-list">
        {% for mission in daily_missions %}
          <li class="mission-item">
            <div>
              <strong>{{ mission.title }}</strong>
              <p style="opacity:0.8; margin:4px 0;">{{ mission.description }}</p>
              <span class="mission-reward">+{{ mission.reward.xp }} XP / +{{ mission.reward.gold }} Ryo</span>
            </div>
            <form method="post" action="{{ url_for('.claim_mission', mission_id=mission.id) }}">
              <button class="button secondary" type="submit">Resgatar</button>
            </form>
          </li>
        {% else %}
          <li>Nenhuma missão diária disponível. Volte amanhã!</li>
        {% endfor %}
      </ul>
    </div>

  </div>
</body>
</html>
