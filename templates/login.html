<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Jinchuriki Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --naruto-orange: #f06d0d;
      --konoha-blue: #0d1a3e;
      --dark-blue: #060c1c;
      --text-light: #e0e0e0;
      --border-color: rgba(240, 109, 13, 0.3);
      --shadow-color: rgba(240, 109, 13, 0.4);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--dark-blue);
      background-image: url('https://i.imgur.com/g24HqM4.jpg');
      background-size: cover;
      background-position: center;
      background-blend-mode: multiply;
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, transparent, var(--dark-blue) 85%);
      pointer-events: none;
    }
    .card {
      position: relative;
      width: min(400px, 95vw);
      background: rgba(13, 26, 62, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 60px var(--shadow-color);
      padding: 32px;
      backdrop-filter: blur(8px);
      animation: fadeIn 1s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 2.5rem;
      color: var(--naruto-orange);
      text-shadow: 0 0 10px var(--shadow-color);
    }
    label {
      display: block;
      margin: 18px 0 8px;
      color: var(--text-light);
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--konoha-blue);
      color: var(--text-light);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--naruto-orange);
      box-shadow: 0 0 15px var(--shadow-color);
    }
    .submit-button {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--naruto-orange), #ff5722);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    .submit-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(240, 109, 13, 0.3);
    }
    .submit-button::before {
      content: '›';
      font-size: 1.5rem;
      position: absolute;
      left: 16px;
      opacity: 0;
      transition: all 0.3s ease-out;
    }
    .submit-button:hover::before {
      opacity: 1;
      left: 20px;
    }
    .info, .error {
      margin: 14px 0;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .error {
      background: rgba(255, 82, 82, 0.2);
      color: #ffcdd2;
      border: 1px solid rgba(255, 82, 82, 0.5);
    }
    .google-button {
      display: block;
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-light);
      text-decoration: none;
      transition: background 0.3s ease;
    }
    .google-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Acesso Ninja</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% for msg in messages %}<div class="info">{{ msg }}</div>{% endfor %}
    <form method="post">
      <label for="username">Seu Nome de Ninja</label>
      <input type="text" id="username" name="username" required autofocus>
      <label for="password">Jutsu Secreto (Senha)</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="submit-button">Entrar na Missão</button>
    </form>
    {% if google_enabled %}
      <a href="{{ url_for('google_login') }}" class="google-button">Entrar com a Aliança Shinobi</a>
    {% endif %}
  </div>
</body>
</html>
