<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('antix_panel.static', filename='css/antix.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.min.css" />
</head>
<body>
    <div id="antix-dashboard">
        <header>
            <h1>ANTI X PANEL</h1>
            <nav>
                <a href="/antix/system-monitor" hx-get="{{ url_for('antix_panel.load_component', component_name='system_monitor') }}" hx-target="main" hx-push-url="true">Monitor</a>
                <a href="/antix/terminal" hx-get="{{ url_for('antix_panel.load_component', component_name='terminal') }}" hx-target="main" hx-push-url="true">Terminal</a>
                <a href="/antix/process-manager" hx-get="{{ url_for('antix_panel.load_component', component_name='process_manager') }}" hx-target="main" hx-push-url="true">Processes</a>
                <a href="/antix/docker-manager" hx-get="{{ url_for('antix_panel.load_component', component_name='docker_manager') }}" hx-target="main" hx-push-url="true">Docker</a>
            </nav>
        </header>

        <main hx-get="{{ url_for('antix_panel.load_component', component_name=page) }}" hx-trigger="load">
            <!-- O conteúdo da página será carregado aqui pelo HTMX -->
        </main>
    </div>
    <script src="{{ url_for('antix_panel.static', filename='js/antix.js') }}"></script>
</body>
</html>
