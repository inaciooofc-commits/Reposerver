<div id="system-monitor" class="widget-container">
    <h2>Live System Monitor</h2>
    <div class="grid-monitor">
        <div class="metric" id="cpu-usage">CPU: <span>--</span>%</div>
        <div class="metric" id="ram-usage">RAM: <span>--</span>%</div>
        <div class="metric" id="disk-usage">DISK: <span>--</span>%</div>
        <div class="metric" id="network-traffic">NET I/O: <span>--</span></div>
    </div>
</div>

<div id="terminal" class="widget-container">
    <h2>Live Terminal</h2>
    <div id="terminal-container"></div>
</div>

<div id="process-manager" class="widget-container">
    <h2>Process Manager</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr><th>PID</th><th>Process</th><th>CPU %</th><th>Memory</th><th>User</th></tr>
            </thead>
            <tbody id="process-list">
                <!-- Process data will be injected here -->
            </tbody>
        </table>
    </div>
</div>

<div id="docker-manager" class="widget-container">
    <h2>Docker Manager</h2>
    <div class="table-container">
         <table>
            <thead>
                <tr><th>ID</th><th>Image</th><th>Status</th><th>Ports</th><th>Name</th></tr>
            </thead>
            <tbody id="docker-containers">
                <!-- Container data will be injected here -->
            </tbody>
        </table>
    </div>
</div>
